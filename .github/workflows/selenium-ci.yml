name: Selenium CI - Login & Register Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: selenium-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: quiz_pengupil

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: quiz_pengupil
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mysqli

      - name: Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -u root -proot --silent; do
            echo "Menunggu MySQL siap..."
            sleep 2
          done

      - name: Import database schema
        run: |
          mysql -h 127.0.0.1 -u root -proot quiz_pengupil < db/quiz_pengupil.sql

      - name: Start PHP built-in server
        run: |
          nohup php -S 127.0.0.1:8000 -t "$GITHUB_WORKSPACE" >/tmp/quiz-php.log 2>&1 &
          for i in {1..15}; do
            if curl --fail --silent http://127.0.0.1:8000/login.php >/dev/null; then
              echo "PHP server siap"
              break
            fi
            sleep 1
          done
          curl --fail http://127.0.0.1:8000/login.php >/dev/null

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt bcrypt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run Selenium test suite
        env:
          BASE_URL: http://127.0.0.1:8000
          CI: "true"
        run: |
          mkdir -p artifacts
          pytest tests/ -v --junitxml=artifacts/report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: artifacts/
          if-no-files-found: error
